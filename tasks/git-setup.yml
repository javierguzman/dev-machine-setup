- name: Github setup name
  git_config:
    name: user.name
    scope: global
    value: "Javier Guzman"
  tags:
    - git

- name: Github setup email
  git_config:
    name: user.email
    scope: global
    value: "906599+javierguzman@users.noreply.github.com"
  tags:
    - git

- name: Github setup initial branch
  git_config:
    name: init.defaultbranch
    scope: global
    value: "main"
  tags:
    - git

# GPG commit signing (requires YubiKey with GPG key loaded)
- name: Configure GPG signing key
  git_config:
    name: user.signingkey
    scope: global
    value: "34D3A6FB8181BEA7"
  tags:
    - git

- name: Enable GPG commit signing
  git_config:
    name: commit.gpgsign
    scope: global
    value: "true"
  tags:
    - git

- name: Set GPG program
  git_config:
    name: gpg.program
    scope: global
    value: "gpg"
  tags:
    - git
