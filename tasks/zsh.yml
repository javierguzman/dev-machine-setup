# macOS
- name: Install Zsh (macOS)
  community.general.homebrew:
    name: zsh
    state: present
  when: ansible_os_family == "Darwin"

- name: Set default shell to zsh (macOS)
  ansible.builtin.command: chsh -s /opt/homebrew/bin/zsh {{ ansible_env.USER }}
  become: true
  changed_when: false
  when: ansible_os_family == "Darwin"

# Linux
- name: Install Zsh (Linux)
  become: true
  apt:
    name: zsh
    state: present
  when: ansible_os_family == "Debian"

- name: Set default shell to zsh (Linux)
  ansible.builtin.command: chsh -s /usr/bin/zsh {{ ansible_env.USER }}
  become: true
  changed_when: false
  when: ansible_os_family == "Debian"

# Cross-platform
- name: Clone Oh-My-Zsh repository
  git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ ansible_user_dir }}/.oh-my-zsh"
    version: master

- name: Install Powerlevel10k theme
  git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "{{ ansible_user_dir }}/.oh-my-zsh/custom/themes/powerlevel10k"
    version: master

- name: Clone Zsh-autosuggestions repository
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: "{{ ansible_user_dir }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    version: master
